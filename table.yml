name: pumpsie_table

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 5 * * *'

jobs:
  pumpsie_bot-post:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v2
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
      - name: Install packages
        run: |
          R -e 'install.packages("bskyr")'
          R -e 'install.packages("fontawesome")'
          R -e 'install.packages("glue")'
          R -e 'install.packages("gt")'
          R -e 'install.packages("here")'
          R -e 'install.packages("tidyverse")'
          R -e 'install.packages("webshot2")'
  
      - name: Debug secrets
        run: |
          if [ -z "$BLUESKY_APP_USER" ]; then echo "SECRET IS EMPTY"; else echo "SECRET IS SET (length: ${#BLUESKY_APP_USER})"; fi
        env:
          BLUESKY_APP_USER: ${{ secrets.BLUESKY_APP_USER }}
      - name: Rscript
        run: Rscript bot_script_table.R
        env:
          BLUESKY_APP_USER: ${{ secrets.BLUESKY_APP_USER }}
          BLUESKY_APP_PASS: ${{ secrets.BLUESKY_APP_PASS }}
